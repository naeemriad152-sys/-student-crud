 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>نظام إدارة الطلاب - قائمة الطلاب</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h3 class="mb-0">قائمة الطلاب</h3>
                <a th:href="@{/students/showNewStudentForm}" class="btn btn-light text-primary fw-bold">إضافة طالب جديد</a>
            </div>
            <div class="card-body">
                <table class="table table-hover table-bordered text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>الرقم المعرف (ID)</th>
                            <th>اسم الطالب</th>
                            <th>التخصص</th>
                            <th>المعدل / الدرجة</th>
                            <th>الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="student : ${listStudents}">
                            <td th:text="${student.id}"></td>
                            <td th:text="${student.name}"></td>
                            <td th:text="${student.major}"></td>
                            <td th:text="${student.grade}"></td>
                            <td>
                                <a th:href="@{/students/showFormForUpdate/{id}(id=${student.id})}" class="btn btn-warning btn-sm me-2">تعديل</a>
                                <a th:href="@{/students/deleteStudent/{id}(id=${student.id})}" class="btn btn-danger btn-sm" 
                                   onclick="return confirm('هل أنت متأكد من رغبتك في حذف هذا الطالب؟')">حذف</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listStudents)}">
                            <td colspan="5" class="text-muted py-4">لا يوجد طلاب مسجلين في النظام حالياً.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>
</html>
