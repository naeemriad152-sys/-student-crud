 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>تعديل بيانات الطالب</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-header bg-warning text-dark">
                        <h4 class="mb-0">تعديل بيانات الطالب</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/students/saveStudent}" th:object="${student}" method="POST">
                            
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">
                                <label for="name" class="form-label">اسم الطالب:</label>
                                <input type="text" th:field="*{name}" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="major" class="form-label">التخصص الجامعي:</label>
                                <input type="text" th:field="*{major}" class="form-control" required>
                            </div>
                            
                            <div class="mb-3">
                                <label for="grade" class="form-label">المعدل / الدرجة:</label>
                                <input type="number" step="0.01" th:field="*{grade}" class="form-control" required>
                            </div>
                            
                            <div class="d-flex justify-content-between">
                                <button type="submit" class="btn btn-warning px-4">تحديث البيانات</button>
                                <a th:href="@{/students}" class="btn btn-secondary">إلغاء والعودة</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
